name: Probar y publicar Tipi

on:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: tipi-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: voice/requirements-dev.txt
      - name: Instalar herramientas de verificación
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 shellcheck
      - run: pip install -r voice/requirements-dev.txt -e voice
      - run: python -m pip check
      - run: python -m compileall -q voice/tipi_voice voice/tests voice/tools
      - run: pytest -q voice/tests
      - run: ruff check voice/tipi_voice voice/tests voice/tools
      - run: ruff format --check voice/tipi_voice voice/tests voice/tools
      - run: shellcheck -e SC1091 scripts/*.sh voice/entrypoint.sh
      - run: node --check gateway/patch-spanish-realtime.mjs
      - run: node --check scripts/host-exec.mjs
      - run: node --check scripts/sync-openclaw-config.mjs
      - name: Validar Compose y configuración
        run: |
          cp .env.example .env
          docker compose --profile linux-audio --profile tools config --quiet
          docker compose --profile linux-audio config --format json >/tmp/tipi-compose.json
          python -c "import json; d=json.load(open('/tmp/tipi-compose.json')); assert 'OPENAI_REALTIME_API_KEY' not in d['services']['tipi-voice'].get('environment', {})"
          python -m json.tool config/openclaw.json >/dev/null

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: voice/requirements-dev.txt
      - run: python -m pip install -r voice/requirements-dev.txt -e voice
      - run: python -m pip check
      - run: pytest -q voice/tests
      - run: ruff check voice/tipi_voice voice/tests voice/tools
      - run: ruff format --check voice/tipi_voice voice/tests voice/tools
      - name: Validar scripts PowerShell
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            $errors += $parseErrors
          }
          if ($errors.Count) { $errors | Format-List; exit 1 }

  image:
    needs: [test, test-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: voice_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tipi-voice
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./voice
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.voice_meta.outputs.tags }}
          labels: ${{ steps.voice_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - id: gateway_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tipi-openclaw
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./gateway
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          no-cache: true
          tags: ${{ steps.gateway_meta.outputs.tags }}
          labels: ${{ steps.gateway_meta.outputs.labels }}
          provenance: mode=max
          sbom: true

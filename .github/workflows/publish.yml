name: Publicar Tipi Voice

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "voice/**"
      - "gateway/**"
      - ".github/workflows/publish.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: voice/requirements-dev.txt
      - name: Instalar PortAudio para las pruebas de voz
        run: sudo apt-get update && sudo apt-get install -y libportaudio2
      - run: pip install -r voice/requirements-dev.txt -e voice
      - run: pytest -q voice/tests

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: voice_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tipi-voice
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./voice
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.voice_meta.outputs.tags }}
          labels: ${{ steps.voice_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - id: gateway_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tipi-openclaw
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./gateway
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          no-cache: true
          build-args: CODEX_VERSION=latest
          tags: ${{ steps.gateway_meta.outputs.tags }}
          labels: ${{ steps.gateway_meta.outputs.labels }}
          provenance: mode=max
          sbom: true
